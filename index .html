<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smart Asset Tracker</title>
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Asset Tracker">
<meta name="theme-color" content="#0A0F1E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════
   PHASE 1 DESIGN SYSTEM — Enterprise Asset Management
   Inspired by SAP Fiori · Microsoft Fluent · Apple HIG
   Spacing scale: 8 · 16 · 24 · 32px
   Radius: Card=16px · Button=12px · Input=12px
═══════════════════════════════════════════════════════════ */

/* ── DESIGN TOKENS ────────────────────────────────────── */
:root {
  /* Primary brand */
  --primary-900: #0A1628;
  --primary-800: #0F2040;
  --primary-700: #1A3560;
  --primary-600: #1E4A8A;
  --primary-500: #2563EB;
  --primary-400: #3B82F6;
  --primary-300: #60A5FA;
  --primary-200: #BFDBFE;
  --primary-100: #DBEAFE;
  --primary-50:  #EFF6FF;

  /* Semantic */
  --success-600: #047857;
  --success-500: #059669;
  --success-400: #10B981;
  --success-100: #D1FAE5;
  --success-50:  #ECFDF5;

  --warning-600: #B45309;
  --warning-500: #D97706;
  --warning-400: #F59E0B;
  --warning-100: #FDE68A;
  --warning-50:  #FFFBEB;

  --danger-600:  #B91C1C;
  --danger-500:  #DC2626;
  --danger-400:  #EF4444;
  --danger-100:  #FEE2E2;
  --danger-50:   #FEF2F2;

  /* Gray scale */
  --gray-950: #030712;
  --gray-900: #111827;
  --gray-800: #1F2937;
  --gray-700: #374151;
  --gray-600: #4B5563;
  --gray-500: #6B7280;
  --gray-400: #9CA3AF;
  --gray-300: #D1D5DB;
  --gray-200: #E5E7EB;
  --gray-100: #F3F4F6;
  --gray-50:  #F9FAFB;

  /* Semantic aliases — Light Mode */
  --bg:          #F4F6FA;
  --bg-subtle:   #EEF1F8;
  --surface-0:   #FFFFFF;
  --surface-1:   #F9FAFB;
  --surface-2:   #F3F4F6;
  --border:      #E5E7EB;
  --border-strong:#D1D5DB;
  --ink:         #111827;
  --ink-2:       #374151;
  --ink-3:       #6B7280;
  --ink-4:       #9CA3AF;

  /* Topbar */
  --topbar-bg:   #0A0F1E;
  --topbar-border: rgba(255,255,255,.07);

  /* Shadows */
  --shadow-xs:  0 1px 2px rgba(16,24,40,.05);
  --shadow-sm:  0 1px 3px rgba(16,24,40,.08), 0 1px 2px rgba(16,24,40,.06);
  --shadow-md:  0 4px 8px rgba(16,24,40,.08), 0 2px 4px rgba(16,24,40,.06);
  --shadow-lg:  0 12px 24px rgba(16,24,40,.10), 0 4px 8px rgba(16,24,40,.06);
  --shadow-xl:  0 24px 48px rgba(16,24,40,.16), 0 8px 16px rgba(16,24,40,.08);

  /* Radius */
  --r-xs:  4px;
  --r-sm:  8px;
  --r-md:  12px;   /* buttons, inputs */
  --r-lg:  16px;   /* cards */
  --r-xl:  24px;   /* panels */
  --r-full:9999px;

  /* Spacing */
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 20px;
  --sp-6: 24px;
  --sp-7: 28px;
  --sp-8: 32px;

  /* Type */
  --font-sans:  'Inter','Sarabun',system-ui,sans-serif;
  --font-thai:  'Sarabun','Inter',system-ui,sans-serif;
  --font-mono:  'IBM Plex Mono',ui-monospace,monospace;
}

/* ── DARK MODE ────────────────────────────────────────── */
[data-theme="dark"] {
  --bg:          #0D1117;
  --bg-subtle:   #090D14;
  --surface-0:   #161B22;
  --surface-1:   #1C2128;
  --surface-2:   #22272E;
  --border:      #30363D;
  --border-strong:#444C56;
  --ink:         #F0F6FC;
  --ink-2:       #CDD9E5;
  --ink-3:       #8B949E;
  --ink-4:       #6E7681;

  --primary-500: #388BFD;
  --primary-400: #58A6FF;
  --primary-50:  #1C2A3F;

  --success-500: #3FB950;
  --success-50:  #122820;
  --success-100: #1A3A25;

  --warning-500: #D29922;
  --warning-50:  #271D0A;
  --warning-100: #3A2A0E;

  --danger-500:  #F85149;
  --danger-50:   #2D1116;
  --danger-100:  #3D1A1A;

  --topbar-bg:   #010409;
  --topbar-border: rgba(255,255,255,.06);

  --shadow-xs:  0 1px 2px rgba(0,0,0,.4);
  --shadow-sm:  0 1px 3px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.3);
  --shadow-md:  0 4px 8px rgba(0,0,0,.5), 0 2px 4px rgba(0,0,0,.4);
  --shadow-lg:  0 12px 24px rgba(0,0,0,.6), 0 4px 8px rgba(0,0,0,.4);
  --shadow-xl:  0 24px 48px rgba(0,0,0,.7), 0 8px 16px rgba(0,0,0,.5);
}

/* ── RESET ────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font-thai);
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  transition: background .2s, color .2s;
  -webkit-font-smoothing: antialiased;
}
a { text-decoration: none; color: inherit; }
button { font-family: var(--font-thai); cursor: pointer; }
input, textarea, select { font-family: var(--font-thai); }

.mono {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.01em;
}

/* ── TOPBAR ───────────────────────────────────────────── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--topbar-bg);
  border-bottom: 1px solid var(--topbar-border);
  display: flex; align-items: center;
  height: 56px; padding: 0 var(--sp-5);
  gap: 0;
}

.brand {
  display: flex; align-items: center; gap: var(--sp-2);
  margin-right: var(--sp-6); flex-shrink: 0;
}
.brand-mark {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--primary-500), var(--primary-700));
  border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 0 1px rgba(59,130,246,.3), 0 2px 8px rgba(59,130,246,.2);
}
.brand-mark svg { width: 18px; height: 18px; color: #fff; }
.brand-text { display: flex; flex-direction: column; line-height: 1.1; }
.brand-name {
  font-family: var(--font-sans);
  font-size: 13px; font-weight: 700;
  color: #F8FAFC; letter-spacing: -.02em;
}
.brand-sub {
  font-size: 10px; font-weight: 400;
  color: rgba(248,250,252,.35); letter-spacing: .06em; text-transform: uppercase;
}

.topbar-nav { display: flex; gap: var(--sp-1); flex: 1; overflow-x: auto; }
.topbar-nav::-webkit-scrollbar { display: none; }

.nav-item {
  display: flex; align-items: center; gap: 6px;
  padding: 7px var(--sp-3); border: none; background: none;
  color: rgba(248,250,252,.45);
  font-size: 13.5px; font-weight: 500;
  border-radius: var(--r-sm); white-space: nowrap;
  transition: color .15s, background .15s;
  position: relative;
}
.nav-item:hover { color: rgba(248,250,252,.8); background: rgba(255,255,255,.06); }
.nav-item.active { color: #F8FAFC; background: rgba(255,255,255,.10); }
.nav-item.active::after {
  content: ''; position: absolute; bottom: -1px; left: var(--sp-3); right: var(--sp-3);
  height: 2px; background: var(--primary-400); border-radius: 2px 2px 0 0;
}
.nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }

.topbar-end { display: flex; align-items: center; gap: var(--sp-2); margin-left: auto; }

.live-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: var(--r-full);
  background: rgba(16,185,129,.12); border: 1px solid rgba(16,185,129,.2);
  font-size: 11px; font-weight: 600; color: #34D399;
  font-family: var(--font-mono); letter-spacing: .04em;
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%; background: #10B981;
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

.top-clock {
  font-family: var(--font-mono); font-size: 11.5px;
  color: rgba(248,250,252,.3); white-space: nowrap;
}

.icon-btn {
  width: 34px; height: 34px; border: 1px solid rgba(255,255,255,.1);
  background: rgba(255,255,255,.05); border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  color: rgba(248,250,252,.6); transition: all .15s; flex-shrink: 0;
  font-size: 15px;
}
.icon-btn:hover { background: rgba(255,255,255,.1); color: #F8FAFC; }

/* ── LAYOUT ───────────────────────────────────────────── */
.page { max-width: 1280px; margin: 0 auto; padding: var(--sp-6) var(--sp-5) 80px; }
.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* ── PAGE HEADER ──────────────────────────────────────── */
.page-hd {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: var(--sp-6); flex-wrap: wrap; gap: var(--sp-4);
}
.page-hd-left {}
.page-hd-eyebrow {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .1em; color: var(--primary-400); margin-bottom: var(--sp-1);
}
.page-hd-title {
  font-family: var(--font-sans); font-size: 22px; font-weight: 700;
  color: var(--ink); letter-spacing: -.02em; line-height: 1.2;
}
.page-hd-sub { font-size: 13px; color: var(--ink-3); margin-top: 3px; }

/* ── SECTION HEADER ───────────────────────────────────── */
.sec-hd {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: var(--sp-4); flex-wrap: wrap; gap: var(--sp-3);
}
.sec-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .09em; color: var(--ink-3);
  display: flex; align-items: center; gap: var(--sp-2);
}
.sec-label::before {
  content: ''; width: 3px; height: 14px;
  background: var(--primary-400); border-radius: 2px;
}

/* ── KPI CARDS ────────────────────────────────────────── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: var(--sp-4); margin-bottom: var(--sp-4);
}

.kpi-card {
  background: var(--surface-0);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: var(--sp-5) var(--sp-5) var(--sp-4);
  box-shadow: var(--shadow-sm);
  position: relative; overflow: hidden;
  transition: box-shadow .2s, transform .2s;
}
.kpi-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }

.kpi-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  background: var(--kpi-accent, var(--primary-500));
  border-radius: var(--r-lg) var(--r-lg) 0 0;
}
.kpi-card.success { --kpi-accent: var(--success-500); }
.kpi-card.warning { --kpi-accent: var(--warning-500); }
.kpi-card.danger  { --kpi-accent: var(--danger-500); }
.kpi-card.primary { --kpi-accent: var(--primary-500); }

.kpi-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--sp-3); }
.kpi-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .07em; color: var(--ink-3);
}
.kpi-icon {
  width: 32px; height: 32px; border-radius: var(--r-sm);
  background: var(--kpi-icon-bg, var(--primary-50));
  display: flex; align-items: center; justify-content: center;
}
.kpi-icon svg { width: 16px; height: 16px; color: var(--kpi-accent, var(--primary-500)); }
.kpi-card.success .kpi-icon { background: var(--success-50); }
.kpi-card.warning .kpi-icon { background: var(--warning-50); }
.kpi-card.danger  .kpi-icon { background: var(--danger-50); }

.kpi-value {
  font-family: var(--font-mono); font-size: 26px; font-weight: 600;
  color: var(--ink); line-height: 1; letter-spacing: -.02em;
}
.kpi-value.primary { color: var(--primary-500); }
.kpi-value.success { color: var(--success-500); }
.kpi-value.danger  { color: var(--danger-500); }
.kpi-value.warning { color: var(--warning-500); }
.kpi-foot { font-size: 12px; color: var(--ink-4); margin-top: var(--sp-2); }

/* ── CARDS ────────────────────────────────────────────── */
.card {
  background: var(--surface-0);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  margin-bottom: var(--sp-4);
}
.card-header {
  padding: var(--sp-4) var(--sp-5);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: var(--sp-3);
  background: var(--surface-1);
}

/* ── TABLE ────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; }
.data-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
.data-table thead { background: var(--surface-1); }
.data-table th {
  padding: var(--sp-3) var(--sp-4);
  text-align: left;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .07em;
  color: var(--ink-3);
  border-bottom: 1px solid var(--border);
  white-space: nowrap; user-select: none;
}
.data-table th.r, .data-table td.r { text-align: right; }
.data-table td {
  padding: var(--sp-3) var(--sp-4);
  border-bottom: 1px solid var(--border);
  color: var(--ink-2);
  vertical-align: middle;
}
.data-table tbody tr:last-child td { border-bottom: none; }
.data-table tbody tr { transition: background .1s; cursor: pointer; }
.data-table tbody tr:hover { background: var(--surface-1); }

/* mini progress bar */
.mbar-row { display: flex; align-items: center; gap: var(--sp-2); }
.mbar {
  flex: 1; height: 6px; background: var(--border);
  border-radius: var(--r-full); overflow: hidden; min-width: 64px;
}
.mbar-fill { height: 100%; border-radius: var(--r-full); transition: width .6s; }
.mbar-label { font-size: 12px; color: var(--ink-3); min-width: 38px; text-align: right; font-family: var(--font-mono); }

/* ── FILTER BAR ───────────────────────────────────────── */
.filter-bar {
  background: var(--surface-0);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: var(--sp-4) var(--sp-5);
  margin-bottom: var(--sp-4);
  display: flex; gap: var(--sp-3); flex-wrap: wrap; align-items: center;
  box-shadow: var(--shadow-xs);
}

.search-field {
  flex: 1; min-width: 200px;
  display: flex; align-items: center; gap: var(--sp-2);
  background: var(--surface-1);
  border: 1.5px solid var(--border);
  border-radius: var(--r-md);
  padding: 0 var(--sp-3);
  transition: border-color .15s, box-shadow .15s;
}
.search-field:focus-within {
  border-color: var(--primary-400);
  box-shadow: 0 0 0 3px rgba(37,99,235,.12);
  background: var(--surface-0);
}
.search-field svg { color: var(--ink-4); flex-shrink: 0; width: 15px; height: 15px; }
.search-field input {
  flex: 1; border: none; outline: none; background: none;
  font-size: 14px; color: var(--ink); padding: 9px 0;
}
.search-field input::placeholder { color: var(--ink-4); }

.filter-select {
  background: var(--surface-1);
  border: 1.5px solid var(--border);
  border-radius: var(--r-md);
  padding: 9px var(--sp-3);
  font-size: 13.5px; color: var(--ink);
  outline: none; cursor: pointer;
  transition: border-color .15s, box-shadow .15s;
  appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 7L11 1' stroke='%236B7280' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 12px center;
  padding-right: 32px;
}
.filter-select:focus {
  border-color: var(--primary-400);
  box-shadow: 0 0 0 3px rgba(37,99,235,.12);
}

/* ── BUTTONS ──────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px var(--sp-4);
  border-radius: var(--r-md);
  font-size: 13.5px; font-weight: 600;
  border: none; transition: all .15s; white-space: nowrap;
  line-height: 1;
}
.btn svg { width: 14px; height: 14px; flex-shrink: 0; }

.btn-primary {
  background: var(--primary-500); color: #fff;
  box-shadow: 0 1px 2px rgba(37,99,235,.3), 0 0 0 1px rgba(37,99,235,.2);
}
.btn-primary:hover { background: var(--primary-600); box-shadow: 0 2px 4px rgba(37,99,235,.4); }

.btn-success {
  background: var(--success-500); color: #fff;
  box-shadow: 0 1px 2px rgba(5,150,105,.3);
}
.btn-success:hover { background: var(--success-600); }

.btn-warning {
  background: var(--warning-500); color: #fff;
  box-shadow: 0 1px 2px rgba(217,119,6,.3);
}
.btn-warning:hover { background: var(--warning-600); }

.btn-ghost {
  background: var(--surface-1); color: var(--ink-2);
  border: 1.5px solid var(--border);
}
.btn-ghost:hover { background: var(--surface-2); border-color: var(--border-strong); }

.btn-sm { padding: 6px var(--sp-3); font-size: 12.5px; }

.filter-actions { display: flex; gap: var(--sp-2); flex-wrap: wrap; }

/* ── STATUS BADGES ────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11.5px; font-weight: 600;
  padding: 3px 10px; border-radius: var(--r-full);
  white-space: nowrap;
}
.badge-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

.badge-success {
  background: var(--success-50); color: var(--success-600);
  border: 1px solid var(--success-100);
}
.badge-success .badge-dot { background: var(--success-500); }

.badge-danger {
  background: var(--danger-50); color: var(--danger-600);
  border: 1px solid var(--danger-100);
}
.badge-danger .badge-dot { background: var(--danger-500); }

.badge-warning {
  background: var(--warning-50); color: var(--warning-600);
  border: 1px solid var(--warning-100);
}
.badge-warning .badge-dot { background: var(--warning-500); }

.badge-primary {
  background: var(--primary-50); color: var(--primary-600);
  border: 1px solid var(--primary-100);
}
.badge-primary .badge-dot { background: var(--primary-500); }

/* ── DETAIL PANEL ─────────────────────────────────────── */
#overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 200; opacity: 0; pointer-events: none;
  transition: opacity .25s;
  backdrop-filter: blur(4px);
}
#overlay.show { opacity: 1; pointer-events: all; }

#panel {
  position: fixed; top: 0; right: 0;
  width: min(560px, 100vw); height: 100vh;
  background: var(--surface-0); z-index: 201;
  transform: translateX(100%);
  transition: transform .3s cubic-bezier(.2,.7,.3,1);
  overflow-y: auto; box-shadow: var(--shadow-xl);
  display: flex; flex-direction: column;
  border-left: 1px solid var(--border);
}
#panel.open { transform: none; }

.panel-topbar {
  position: sticky; top: 0; z-index: 10;
  background: var(--surface-0);
  border-bottom: 1px solid var(--border);
  padding: var(--sp-4) var(--sp-5);
  display: flex; align-items: center; justify-content: space-between;
}
.panel-topbar-label {
  font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .08em; color: var(--ink-3);
}
.close-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 6px var(--sp-3);
  background: var(--surface-1); border: 1.5px solid var(--border);
  border-radius: var(--r-sm); color: var(--ink-2);
  font-size: 13px; font-weight: 500;
  transition: all .15s;
}
.close-btn:hover { background: var(--surface-2); }
.close-btn svg { width: 13px; height: 13px; }

/* panel hero */
.p-hero {
  padding: var(--sp-6) var(--sp-5) var(--sp-5);
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, var(--surface-1) 0%, var(--surface-0) 100%);
}
.p-chips { display: flex; flex-wrap: wrap; gap: var(--sp-2); margin-bottom: var(--sp-4); }
.p-chip {
  font-size: 11.5px; font-weight: 600; padding: 3px 10px;
  border-radius: var(--r-full);
  background: var(--surface-2); color: var(--ink-3);
  border: 1px solid var(--border);
}
.p-chip.main {
  background: var(--topbar-bg); color: #F8FAFC;
  border-color: transparent;
  box-shadow: 0 1px 2px rgba(0,0,0,.2);
}
.p-asset-label {
  font-size: 10.5px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .15em; color: var(--ink-4); margin-bottom: var(--sp-1);
}
.p-asset-num {
  font-family: var(--font-mono); font-size: 34px; font-weight: 700;
  color: var(--ink); letter-spacing: -.01em; line-height: 1;
  margin-bottom: var(--sp-2);
}
.p-asset-name { font-size: 17px; font-weight: 600; color: var(--ink); line-height: 1.4; }

/* panel meta grid */
.p-meta {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 1px; background: var(--border);
}
.p-meta-cell { background: var(--surface-0); padding: var(--sp-3) var(--sp-5); }
.p-meta-cell.full { grid-column: 1/-1; }
.p-meta-k {
  font-size: 10.5px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .07em; color: var(--ink-4); margin-bottom: 3px;
}
.p-meta-v { font-size: 14px; font-weight: 500; color: var(--ink-2); }

/* panel financials */
.p-fin {
  padding: var(--sp-5);
  border-top: 1px solid var(--border);
  background: var(--surface-1);
}
.p-fin-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: var(--sp-4); flex-wrap: wrap; gap: var(--sp-2);
}
.p-fin-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--ink-3);
}
.live-tag {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: var(--r-full);
  background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.2);
  font-size: 11px; font-weight: 600; color: #10B981;
  font-family: var(--font-mono);
}

.fin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-4) var(--sp-5); margin-bottom: var(--sp-5); }
.fin-item .fin-k { font-size: 11.5px; color: var(--ink-3); margin-bottom: 3px; font-weight: 500; }
.fin-item .fin-v { font-size: 17px; font-weight: 600; color: var(--ink); font-family: var(--font-mono); }
.fin-unit { font-size: 11px; color: var(--ink-4); font-weight: 400; margin-left: 3px; font-family: var(--font-thai); }

.book-val-block {
  background: var(--surface-0);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: var(--sp-4) var(--sp-5);
  display: flex; align-items: flex-end; justify-content: space-between;
  flex-wrap: wrap; gap: var(--sp-3);
  box-shadow: var(--shadow-xs);
}
.book-val-label { font-size: 12px; color: var(--ink-3); font-weight: 600; margin-bottom: var(--sp-1); }
.book-val-num {
  font-family: var(--font-mono); font-size: 40px; font-weight: 800;
  color: var(--success-500); line-height: 1; letter-spacing: -.02em;
}
.book-val-num.done { color: var(--danger-500); }

/* gauge */
.gauge { margin-top: var(--sp-5); }
.gauge-header { display: flex; justify-content: space-between; margin-bottom: var(--sp-2); font-size: 12px; color: var(--ink-3); }
.gauge-header .pct { font-family: var(--font-mono); font-weight: 600; color: var(--ink-2); }
.gauge-track {
  height: 8px; background: var(--border);
  border-radius: var(--r-full); overflow: hidden;
}
.gauge-fill {
  height: 100%; border-radius: var(--r-full);
  background: linear-gradient(90deg, var(--success-400), var(--success-500));
  transition: width 1s cubic-bezier(.2,.7,.3,1);
}
.gauge-fill.done { background: linear-gradient(90deg, var(--danger-400), var(--danger-500)); }
.gauge-footer {
  display: flex; justify-content: space-between;
  margin-top: var(--sp-2); font-size: 11px; color: var(--ink-4);
}

/* panel editable */
.p-edit {
  padding: var(--sp-5);
  border-top: 1px solid var(--border);
  background: var(--surface-0);
}
.p-edit-header { display: flex; align-items: center; gap: var(--sp-2); margin-bottom: var(--sp-1); }
.p-edit-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--ink-3);
}
.editable-tag {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .05em; color: var(--warning-600);
  background: var(--warning-50); border: 1px solid var(--warning-100);
  padding: 2px 7px; border-radius: var(--r-xs);
}
.p-edit-hint { font-size: 12.5px; color: var(--ink-4); margin-bottom: var(--sp-4); line-height: 1.5; }

.form-field { margin-bottom: var(--sp-4); }
.form-field:last-of-type { margin-bottom: 0; }
.form-label {
  display: block; font-size: 12.5px; font-weight: 600;
  color: var(--ink-3); margin-bottom: var(--sp-2);
}
.form-input, .form-textarea {
  width: 100%; font-family: var(--font-thai); font-size: 14px;
  color: var(--ink); background: var(--surface-1);
  border: 1.5px solid var(--border);
  border-radius: var(--r-md); padding: var(--sp-3) var(--sp-3);
  outline: none; transition: border-color .15s, box-shadow .15s, background .15s;
}
.form-textarea { resize: vertical; min-height: 72px; }
.form-input:focus, .form-textarea:focus {
  border-color: var(--primary-400);
  box-shadow: 0 0 0 3px rgba(37,99,235,.12);
  background: var(--surface-0);
}
.form-input::placeholder, .form-textarea::placeholder { color: var(--ink-4); }

.form-actions { display: flex; align-items: center; gap: var(--sp-3); margin-top: var(--sp-4); }
.save-confirm {
  font-size: 13px; color: var(--success-500); font-weight: 600;
  opacity: 0; transition: opacity .25s;
  display: flex; align-items: center; gap: 5px;
}
.save-confirm.show { opacity: 1; }

/* ── LOADING ──────────────────────────────────────────── */
#loading {
  position: fixed; inset: 0; background: var(--bg);
  z-index: 999; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: var(--sp-4);
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--primary-500);
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-label { font-size: 14px; color: var(--ink-3); font-weight: 500; }

/* ── TOAST ────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: var(--sp-6); left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--gray-900); color: #F9FAFB;
  padding: 11px var(--sp-5); border-radius: var(--r-md);
  font-size: 13.5px; font-weight: 500;
  box-shadow: var(--shadow-lg);
  opacity: 0; transition: all .22s; z-index: 999;
  pointer-events: none; white-space: nowrap;
  border: 1px solid rgba(255,255,255,.08);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── LIST COUNT ───────────────────────────────────────── */
.list-count {
  font-size: 12.5px; color: var(--ink-3);
  font-weight: 600; margin-bottom: var(--sp-3); padding: 0 2px;
  display: flex; align-items: center; gap: var(--sp-2);
}
.list-count-num { font-family: var(--font-mono); color: var(--ink); }

/* ── ASSET ID CELL ────────────────────────────────────── */
.asset-id-cell { font-weight: 700; color: var(--primary-500); }
.asset-name-cell { max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }

/* ── RESPONSIVE ───────────────────────────────────────── */
@media (max-width: 768px) {
  .topbar { padding: 0 var(--sp-4); height: 52px; }
  .brand-text { display: none; }
  .top-clock { display: none; }
  .live-pill { display: none; }
  .page { padding: var(--sp-4) var(--sp-3) 72px; }
  .kpi-grid { grid-template-columns: 1fr 1fr; gap: var(--sp-3); }
  .kpi-value { font-size: 20px; }
  .kpi-card { padding: var(--sp-4); }
  .filter-bar { padding: var(--sp-3) var(--sp-4); gap: var(--sp-2); }
  .search-field { min-width: 100%; }
  .filter-actions { width: 100%; }
  .filter-actions .btn { flex: 1; justify-content: center; }
  .fin-grid { grid-template-columns: 1fr; }
  .p-meta { grid-template-columns: 1fr; }
  .book-val-num { font-size: 32px; }
}
@media (max-width: 480px) {
  .kpi-grid { grid-template-columns: 1fr; }
  .data-table th:nth-child(3),
  .data-table td:nth-child(3),
  .data-table th:nth-child(5),
  .data-table td:nth-child(5) { display: none; }
}

/* ═══════════════════════════════════════════════════
   PHASE 2 — Asset List UX Redesign
   Mobile-first card layout · sticky search · animations
═══════════════════════════════════════════════════ */

/* Sticky search */
.list-sticky {
  position: sticky; top: 56px; z-index: 90;
  background: var(--bg);
  padding: var(--sp-4) 0 0;
  margin-bottom: var(--sp-4);
}
.list-search-wrap {
  display: flex; gap: var(--sp-2); align-items: center;
  margin-bottom: 0;
}
.search-field-lg {
  flex: 1; height: 46px; border-radius: var(--r-md);
  padding: 0 var(--sp-3); background: var(--surface-0);
  border: 1.5px solid var(--border); box-shadow: var(--shadow-xs);
  transition: border-color .15s, box-shadow .15s;
}
.search-field-lg:focus-within {
  border-color: var(--primary-400);
  box-shadow: 0 0 0 3px rgba(37,99,235,.12);
  background: var(--surface-0);
}
.search-field-lg input { font-size: 15px; padding: 12px 0; }
.search-field-lg svg { width: 17px; height: 17px; }

.search-clear {
  width: 26px; height: 26px; border: none;
  background: var(--surface-2); border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-3); cursor: pointer; flex-shrink: 0;
  opacity: 0; pointer-events: none; transition: opacity .15s;
}
.search-clear.show { opacity: 1; pointer-events: all; }
.search-clear svg { width: 12px; height: 12px; }

.filter-toggle-btn { position: relative; flex-shrink: 0; height: 46px; }
.filter-count {
  position: absolute; top: -5px; right: -5px;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--primary-500); color: #fff;
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}

/* Export dropdown */
.export-menu-wrap { position: relative; flex-shrink: 0; }
.export-menu-wrap > .btn { height: 46px; }
.export-dropdown {
  position: absolute; top: calc(100% + 6px); right: 0;
  background: var(--surface-0); border: 1px solid var(--border);
  border-radius: var(--r-md); box-shadow: var(--shadow-lg);
  min-width: 210px; z-index: 300; overflow: hidden;
  opacity: 0; pointer-events: none;
  transform: translateY(-6px); transition: opacity .18s, transform .18s;
}
.export-dropdown.open { opacity: 1; pointer-events: all; transform: none; }
.export-item {
  display: flex; align-items: center; gap: var(--sp-3);
  width: 100%; padding: var(--sp-3) var(--sp-4);
  border: none; background: none; font-family: var(--font-thai);
  font-size: 14px; color: var(--ink-2); cursor: pointer;
  transition: background .12s; text-align: left;
}
.export-item:hover { background: var(--surface-1); }
.export-item svg { width: 15px; height: 15px; color: var(--ink-3); flex-shrink: 0; }

/* Filter panel */
.filter-panel { max-height: 0; overflow: hidden; transition: max-height .3s cubic-bezier(.2,.7,.3,1); }
.filter-panel.open { max-height: 200px; }
.filter-panel-inner { padding: var(--sp-4) 0 var(--sp-2); border-top: 1px solid var(--border); margin-top: var(--sp-3); }
.filter-row { display: flex; gap: var(--sp-3); flex-wrap: wrap; align-items: flex-end; }
.filter-group { display: flex; flex-direction: column; gap: var(--sp-1); flex: 1; min-width: 160px; }
.filter-label { font-size: 11.5px; font-weight: 600; color: var(--ink-3); }

/* List header row */
.list-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: var(--sp-4); padding: 0 2px;
}
.view-toggle {
  display: flex; gap: 2px; background: var(--surface-1);
  border: 1px solid var(--border); border-radius: var(--r-sm); padding: 3px;
}
.view-btn {
  width: 30px; height: 30px; border: none; background: none;
  border-radius: 6px; display: flex; align-items: center; justify-content: center;
  color: var(--ink-3); cursor: pointer; transition: all .15s;
}
.view-btn svg { width: 15px; height: 15px; }
.view-btn.active { background: var(--surface-0); color: var(--ink); box-shadow: var(--shadow-xs); }

/* ── Asset Card Grid ──────────────────────────────── */
.asset-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: var(--sp-4);
}

.asset-card {
  background: var(--surface-0);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-sm);
  overflow: hidden; cursor: pointer;
  transition: box-shadow .2s, transform .2s, border-color .2s;
  animation: cardIn .35s cubic-bezier(.2,.7,.3,1) both;
}
.asset-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
  border-color: var(--primary-200);
}
.asset-card:active { transform: translateY(0); box-shadow: var(--shadow-sm); }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.asset-card:nth-child(1)  { animation-delay:.02s }
.asset-card:nth-child(2)  { animation-delay:.04s }
.asset-card:nth-child(3)  { animation-delay:.06s }
.asset-card:nth-child(4)  { animation-delay:.08s }
.asset-card:nth-child(5)  { animation-delay:.10s }
.asset-card:nth-child(6)  { animation-delay:.12s }
.asset-card:nth-child(7)  { animation-delay:.14s }
.asset-card:nth-child(8)  { animation-delay:.16s }
.asset-card:nth-child(9)  { animation-delay:.18s }
.asset-card:nth-child(10) { animation-delay:.20s }
.asset-card:nth-child(11) { animation-delay:.22s }
.asset-card:nth-child(12) { animation-delay:.24s }

/* Color accent strip by group */
.card-strip { height: 4px; }

/* Card content */
.card-body { padding: var(--sp-4); }
.card-top {
  display: flex; justify-content: space-between;
  align-items: flex-start; gap: var(--sp-2); margin-bottom: var(--sp-3);
}
.card-asset-num {
  font-family: var(--font-mono); font-size: 11.5px; font-weight: 600;
  color: var(--primary-500); letter-spacing: .04em;
  background: var(--primary-50); border: 1px solid var(--primary-100);
  padding: 3px 8px; border-radius: var(--r-full); white-space: nowrap;
}

.card-name {
  font-size: 14.5px; font-weight: 600; color: var(--ink);
  line-height: 1.4; margin-bottom: var(--sp-2);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card-group-tag {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11.5px; color: var(--ink-3); font-weight: 500;
  margin-bottom: var(--sp-3);
}
.card-group-tag svg { width: 11px; height: 11px; flex-shrink: 0; }

/* Info rows */
.card-info { display: flex; flex-direction: column; gap: 8px; }
.card-info-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 12.5px; color: var(--ink-3); line-height: 1.4;
}
.card-info-row svg { width: 13px; height: 13px; flex-shrink: 0; color: var(--ink-4); }
.card-info-val { font-weight: 500; color: var(--ink-2); }
.card-info-empty { color: var(--ink-4); font-style: italic; font-weight: 400; }

/* Card footer */
.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--sp-3) var(--sp-4);
  border-top: 1px solid var(--border);
  background: var(--surface-1);
  margin-top: var(--sp-3);
}
.book-val-block {}
.book-val-label {
  font-size: 10px; color: var(--ink-4); font-weight: 700;
  text-transform: uppercase; letter-spacing: .07em; margin-bottom: 2px;
}
.book-val-num {
  font-family: var(--font-mono); font-size: 17px; font-weight: 700;
  color: var(--ink); letter-spacing: -.01em;
}
.book-val-num.success { color: var(--success-500); }
.book-val-num.danger  { color: var(--danger-500); }

/* ── Skeleton loading ─────────────────────────────── */
.skeleton-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: var(--sp-4);
}
.skeleton-card {
  background: var(--surface-0); border: 1px solid var(--border);
  border-radius: var(--r-lg); overflow: hidden; box-shadow: var(--shadow-sm);
}
.skel {
  background: linear-gradient(90deg, var(--surface-1) 25%, var(--surface-2) 50%, var(--surface-1) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.6s infinite linear;
  border-radius: var(--r-sm);
}
@keyframes shimmer { to { background-position: -200% 0; } }
.skel-strip { height: 4px; border-radius: 0; margin-bottom: 0; }
.skel-body { padding: var(--sp-4); }
.skel-line { height: 12px; margin-bottom: 12px; }
.skel-line.lg { height: 16px; }
.skel-line.w-30 { width: 30%; }
.skel-line.w-50 { width: 50%; }
.skel-line.w-70 { width: 70%; }
.skel-line.w-90 { width: 90%; }
.skel-footer { height: 52px; border-top: 1px solid var(--border); background: var(--surface-1); }

/* ── Empty state ──────────────────────────────────── */
.empty-state {
  grid-column: 1/-1;
  display: flex; flex-direction: column; align-items: center;
  padding: 72px var(--sp-6); text-align: center;
}
.empty-icon-wrap {
  width: 80px; height: 80px; border-radius: 50%;
  background: var(--surface-1); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: var(--sp-5);
  box-shadow: var(--shadow-sm);
}
.empty-icon-wrap svg { width: 34px; height: 34px; color: var(--ink-4); }
.empty-title { font-size: 18px; font-weight: 700; color: var(--ink); margin-bottom: var(--sp-2); }
.empty-sub {
  font-size: 14px; color: var(--ink-3); max-width: 320px;
  line-height: 1.7; margin-bottom: var(--sp-5);
}

/* ── Responsive ───────────────────────────────────── */
@media (max-width: 640px) {
  .list-sticky { top: 52px; }
  .asset-grid, .skeleton-grid { grid-template-columns: 1fr; gap: var(--sp-3); }
  .filter-row { flex-direction: column; }
  .filter-group { min-width: 100%; }
  .export-menu-wrap { display: none; }
}
@media (min-width: 1200px) {
  .asset-grid { grid-template-columns: repeat(3, 1fr); }
}


/* ═══════════════════════════════════════════════════════
   PHASE 3 & 4 — Asset Profile + Timeline
   Full-panel redesign: hero, photos, sections, timeline
═══════════════════════════════════════════════════════ */

/* Full-width panel (wider for profile) */
#panel {
  width: min(680px, 100vw) !important;
}

/* ── Panel tabs ──────────────────────────────────────── */
.panel-tabs {
  display: flex; background: var(--surface-1);
  border-bottom: 1px solid var(--border);
  overflow-x: auto; gap: 0;
}
.panel-tabs::-webkit-scrollbar { display: none; }
.ptab {
  flex-shrink: 0; padding: 12px 20px;
  font-size: 13px; font-weight: 600;
  color: var(--ink-3); border: none; background: none;
  cursor: pointer; position: relative; white-space: nowrap;
  font-family: var(--font-thai); transition: color .15s;
}
.ptab:hover { color: var(--ink); }
.ptab.active { color: var(--primary-500); }
.ptab.active::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 2px; background: var(--primary-500);
}

/* ── Tab panes ───────────────────────────────────────── */
.ptab-pane { display: none; }
.ptab-pane.active { display: block; }

/* ── Hero ────────────────────────────────────────────── */
.ap-hero {
  position: relative; overflow: hidden;
  background: var(--topbar-bg);
  min-height: 200px;
}
.ap-cover-img {
  width: 100%; height: 220px; object-fit: cover;
  display: block; opacity: .75;
}
.ap-cover-placeholder {
  width: 100%; height: 180px;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--topbar-bg), #1a2744);
}
.ap-cover-placeholder svg { width: 64px; height: 64px; color: rgba(255,255,255,.12); }

.ap-hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(10,15,30,.95) 0%, rgba(10,15,30,.3) 60%, transparent 100%);
}
.ap-hero-content {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 20px;
}
.ap-hero-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.ap-chip {
  font-size: 11px; font-weight: 600; padding: 3px 9px;
  border-radius: var(--r-full);
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.15);
  color: rgba(255,255,255,.8); backdrop-filter: blur(8px);
}
.ap-chip.status-active  { background: rgba(16,185,129,.2); border-color: rgba(16,185,129,.4); color: #6EE7B7; }
.ap-chip.status-done    { background: rgba(239,68,68,.2); border-color: rgba(239,68,68,.4); color: #FCA5A5; }
.ap-chip.status-future  { background: rgba(245,158,11,.2); border-color: rgba(245,158,11,.4); color: #FCD34D; }
.ap-asset-id {
  font-family: var(--font-mono); font-size: 12px; font-weight: 500;
  color: rgba(255,255,255,.5); letter-spacing: .08em; margin-bottom: 4px;
}
.ap-asset-name {
  font-size: 20px; font-weight: 700; color: #fff;
  line-height: 1.3; margin-bottom: 12px;
}
.ap-hero-meta { display: flex; flex-direction: column; gap: 5px; }
.ap-hero-meta-row {
  display: flex; align-items: center; gap: 7px;
  font-size: 12.5px; color: rgba(255,255,255,.6);
}
.ap-hero-meta-row svg { width: 13px; height: 13px; flex-shrink: 0; }
.ap-hero-meta-row span { font-weight: 500; }

/* QR button */
.ap-qr-btn {
  position: absolute; top: 12px; right: 12px;
  width: 40px; height: 40px; border-radius: var(--r-sm);
  background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15);
  backdrop-filter: blur(8px); color: rgba(255,255,255,.8);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background .15s;
}
.ap-qr-btn:hover { background: rgba(255,255,255,.2); }
.ap-qr-btn svg { width: 20px; height: 20px; }

/* Edit cover button */
.ap-edit-cover {
  position: absolute; top: 12px; left: 12px;
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px; border-radius: var(--r-sm);
  background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15);
  backdrop-filter: blur(8px); color: rgba(255,255,255,.8);
  font-size: 12px; font-weight: 500; cursor: pointer;
  font-family: var(--font-thai); transition: background .15s;
}
.ap-edit-cover:hover { background: rgba(255,255,255,.2); }
.ap-edit-cover svg { width: 13px; height: 13px; }

/* ── Section accordion ───────────────────────────────── */
.ap-section {
  border-bottom: 1px solid var(--border);
  overflow: hidden;
}
.ap-section-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 15px 20px; cursor: pointer;
  user-select: none; transition: background .12s;
  background: var(--surface-0);
}
.ap-section-hd:hover { background: var(--surface-1); }
.ap-section-title {
  display: flex; align-items: center; gap: 10px;
  font-size: 13.5px; font-weight: 700; color: var(--ink);
}
.ap-section-icon {
  width: 30px; height: 30px; border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.ap-section-icon svg { width: 15px; height: 15px; }
.ap-section-chevron {
  width: 20px; height: 20px; color: var(--ink-4);
  transition: transform .25s; flex-shrink: 0;
}
.ap-section.open .ap-section-chevron { transform: rotate(180deg); }
.ap-section-body {
  max-height: 0; overflow: hidden;
  transition: max-height .35s cubic-bezier(.2,.7,.3,1);
  background: var(--surface-0);
}
.ap-section.open .ap-section-body { max-height: 1200px; }
.ap-section-inner { padding: 16px 20px 20px; }

/* Info rows inside sections */
.info-table { width: 100%; border-collapse: collapse; }
.info-table tr { border-bottom: 1px solid var(--border); }
.info-table tr:last-child { border-bottom: none; }
.info-table td { padding: 10px 0; vertical-align: top; }
.info-table .ik {
  font-size: 12px; font-weight: 600; color: var(--ink-4);
  text-transform: uppercase; letter-spacing: .05em;
  width: 42%; padding-right: 12px; padding-top: 12px;
}
.info-table .iv {
  font-size: 14px; font-weight: 500; color: var(--ink-2);
}
.info-table .iv.mono { font-family: var(--font-mono); }

/* Financial highlight box */
.fin-highlight {
  background: linear-gradient(135deg, var(--primary-900, #0A1628), #0f2040);
  border: 1px solid var(--primary-700, #1A3560);
  border-radius: var(--r-lg); padding: 20px;
  margin-bottom: 16px; text-align: center;
}
.fin-highlight-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .1em; color: var(--primary-300); margin-bottom: 6px;
}
.fin-highlight-val {
  font-family: var(--font-mono); font-size: 36px; font-weight: 800;
  color: #fff; letter-spacing: -.02em; line-height: 1;
}
.fin-highlight-val.done { color: var(--danger-400); }
.fin-highlight-unit { font-size: 14px; font-weight: 400; color: rgba(255,255,255,.5); margin-left: 4px; }

/* Gauge (reuse + extend) */
.fin-gauge-wrap { margin: 16px 0 0; }
.fin-gauge-labels {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--ink-4); margin-bottom: 6px;
}
.fin-gauge-labels .pct-val { font-family: var(--font-mono); font-weight: 600; color: var(--ink-2); }

/* Stat row */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
.stat-box {
  background: var(--surface-1); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 12px 14px;
}
.stat-k { font-size: 11px; color: var(--ink-4); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
.stat-v { font-family: var(--font-mono); font-size: 16px; font-weight: 700; color: var(--ink); }

/* ── Photo gallery ───────────────────────────────────── */
.photo-gallery { padding: 16px 20px 20px; }
.photo-upload-area {
  border: 2px dashed var(--border);
  border-radius: var(--r-lg); padding: 28px 20px;
  text-align: center; cursor: pointer;
  transition: border-color .15s, background .15s;
  margin-bottom: 16px; position: relative;
}
.photo-upload-area:hover { border-color: var(--primary-400); background: var(--primary-50); }
.photo-upload-area input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.photo-upload-icon {
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--surface-2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 10px;
}
.photo-upload-icon svg { width: 22px; height: 22px; color: var(--ink-3); }
.photo-upload-title { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
.photo-upload-sub { font-size: 12.5px; color: var(--ink-4); }

.photo-upload-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.photo-upload-btns .btn { flex: 1; justify-content: center; min-width: 120px; position: relative; overflow: hidden; }
.photo-upload-btns .btn input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}

.photo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.photo-item {
  position: relative; border-radius: var(--r-md); overflow: hidden;
  aspect-ratio: 1; background: var(--surface-2);
  cursor: pointer; group: true;
}
.photo-item img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform .2s;
}
.photo-item:hover img { transform: scale(1.05); }
.photo-item-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,.5);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px;
  opacity: 0; transition: opacity .15s;
}
.photo-item:hover .photo-item-overlay { opacity: 1; }
.photo-del-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(239,68,68,.8); border: none; color: #fff;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
}
.photo-del-btn svg { width: 14px; height: 14px; }
.photo-cover-badge {
  position: absolute; top: 6px; left: 6px;
  background: var(--primary-500); color: #fff;
  font-size: 10px; font-weight: 700; padding: 2px 7px;
  border-radius: var(--r-full); letter-spacing: .04em;
}
.photo-empty {
  text-align: center; padding: 28px; color: var(--ink-4); font-size: 13.5px;
}

/* Lightbox */
.lightbox {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.96); display: none;
  align-items: center; justify-content: center;
}
.lightbox.open { display: flex; }
.lightbox-img { max-width: 92vw; max-height: 88vh; border-radius: var(--r-sm); object-fit: contain; }
.lightbox-close {
  position: absolute; top: 16px; right: 16px;
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(255,255,255,.15); border: none; color: #fff;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
}
.lightbox-close svg { width: 18px; height: 18px; }
.lightbox-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,.12); border: none; color: #fff;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  transition: background .15s;
}
.lightbox-nav:hover { background: rgba(255,255,255,.25); }
.lightbox-nav.prev { left: 16px; }
.lightbox-nav.next { right: 16px; }
.lightbox-counter {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,.5); color: #fff;
  font-size: 13px; padding: 5px 14px; border-radius: var(--r-full);
  font-family: var(--font-mono);
}

/* QR Modal */
.qr-modal {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.7); display: none;
  align-items: center; justify-content: center;
  padding: 20px;
}
.qr-modal.open { display: flex; }
.qr-modal-card {
  background: var(--surface-0); border-radius: var(--r-xl);
  padding: 32px; text-align: center; max-width: 320px; width: 100%;
  box-shadow: var(--shadow-xl);
}
.qr-modal-title { font-size: 15px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
.qr-modal-sub { font-size: 13px; color: var(--ink-3); margin-bottom: 20px; }
#qr-canvas { border-radius: var(--r-md); margin-bottom: 16px; }
.qr-modal-close {
  width: 100%; padding: 11px; border: 1.5px solid var(--border);
  border-radius: var(--r-md); background: none; font-family: var(--font-thai);
  font-size: 14px; font-weight: 600; color: var(--ink-2); cursor: pointer;
}

/* ── Timeline ─────────────────────────────────────────── */
.timeline { padding: 16px 20px 24px; }
.timeline-add {
  display: flex; gap: 8px; margin-bottom: 20px;
}
.timeline-add input, .timeline-add select {
  flex: 1; font-family: var(--font-thai); font-size: 14px;
  background: var(--surface-1); border: 1.5px solid var(--border);
  border-radius: var(--r-md); padding: 9px 12px; color: var(--ink);
  outline: none; transition: border-color .15s;
}
.timeline-add input:focus, .timeline-add select:focus {
  border-color: var(--primary-400);
}
.tl-entry-row {
  display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap;
}
.tl-entry-row select, .tl-entry-row input {
  font-family: var(--font-thai); font-size: 13.5px;
  background: var(--surface-1); border: 1.5px solid var(--border);
  border-radius: var(--r-md); padding: 9px 12px; color: var(--ink);
  outline: none; transition: border-color .15s;
}
.tl-type-sel { width: 140px; flex-shrink: 0; }
.tl-desc-input { flex: 1; min-width: 160px; }
.tl-entry-row select:focus, .tl-entry-row input:focus { border-color: var(--primary-400); }

.tl-add-btn {
  width: 100%; margin-bottom: 24px;
  padding: 11px; justify-content: center;
}

.tl-list { position: relative; }
.tl-list::before {
  content: ''; position: absolute;
  left: 19px; top: 0; bottom: 0; width: 2px;
  background: var(--border); border-radius: 1px;
}

.tl-item {
  display: flex; gap: 16px; margin-bottom: 20px;
  position: relative; animation: cardIn .3s ease both;
}
.tl-icon-wrap {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; position: relative; z-index: 1;
  border: 3px solid var(--bg);
}
.tl-icon-wrap svg { width: 16px; height: 16px; }

.tl-body { flex: 1; min-width: 0; padding-top: 8px; }
.tl-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
.tl-type-label { font-size: 12.5px; font-weight: 700; color: var(--ink); }
.tl-time { font-size: 11.5px; color: var(--ink-4); font-family: var(--font-mono); white-space: nowrap; }
.tl-desc { font-size: 13.5px; color: var(--ink-2); line-height: 1.5; }
.tl-user { font-size: 11.5px; color: var(--ink-4); margin-top: 4px; display: flex; align-items: center; gap: 4px; }
.tl-user svg { width: 11px; height: 11px; }

.tl-empty {
  text-align: center; padding: 40px 20px;
  color: var(--ink-4); font-size: 13.5px;
}
.tl-empty svg { width: 36px; height: 36px; margin: 0 auto 10px; display: block; opacity: .4; }

/* TL type colors */
.tl-purchase  .tl-icon-wrap { background: var(--primary-50); color: var(--primary-500); }
.tl-transfer  .tl-icon-wrap { background: var(--warning-50); color: var(--warning-500); }
.tl-maintenance .tl-icon-wrap { background: var(--danger-50); color: var(--danger-500); }
.tl-inspection .tl-icon-wrap { background: #F0FDF4; color: #16A34A; }
.tl-photo     .tl-icon-wrap { background: #FDF4FF; color: #9333EA; }
.tl-edit      .tl-icon-wrap { background: var(--surface-2); color: var(--ink-3); }
.tl-note      .tl-icon-wrap { background: var(--amber-s, #FFFBEB); color: var(--amber, #D97706); }

/* Field info editable */
.field-info-form { display: flex; flex-direction: column; gap: 14px; }

/* Mobile panel */
@media (max-width: 640px) {
  #panel { width: 100vw !important; }
  .ap-hero { min-height: 160px; }
  .ap-cover-img { height: 180px; }
  .ap-cover-placeholder { height: 140px; }
  .ap-asset-name { font-size: 17px; }
  .fin-highlight-val { font-size: 28px; }
  .photo-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .stat-grid { grid-template-columns: 1fr; }
}

</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <div class="loading-label">กำลังโหลดข้อมูล...</div>
</div>

<!-- Overlay -->
<div id="overlay" onclick="closePanel()"></div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- Detail Panel -->
<div id="panel">
  <!-- Panel topbar (always visible) -->
  <div class="panel-topbar">
    <span class="panel-topbar-label">Asset Profile</span>
    <button class="close-btn" onclick="closePanel()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
      ปิด
    </button>
  </div>
  <!-- Tab bar -->
  <div class="panel-tabs" id="panel-tabs">
    <button class="ptab active" onclick="switchPTab('info',this)">ข้อมูล</button>
    <button class="ptab" onclick="switchPTab('photos',this)">รูปภาพ</button>
    <button class="ptab" onclick="switchPTab('timeline',this)">Timeline</button>
  </div>
  <!-- Tab panes -->
  <div id="ptab-info" class="ptab-pane active">
    <div id="panel-body"></div>
  </div>
  <div id="ptab-photos" class="ptab-pane">
    <div id="panel-photos"></div>
  </div>
  <div id="ptab-timeline" class="ptab-pane">
    <div id="panel-timeline"></div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
  </button>
  <button class="lightbox-nav prev" onclick="lightboxNav(-1);event.stopPropagation()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
  </button>
  <img class="lightbox-img" id="lightbox-img" src="" alt="">
  <button class="lightbox-nav next" onclick="lightboxNav(1);event.stopPropagation()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
  </button>
  <div class="lightbox-counter" id="lightbox-counter"></div>
</div>

<!-- QR Modal -->
<div class="qr-modal" id="qr-modal" onclick="closeQR(event)">
  <div class="qr-modal-card" onclick="event.stopPropagation()">
    <div class="qr-modal-title" id="qr-title">QR Code</div>
    <div class="qr-modal-sub" id="qr-sub">สแกนเพื่อเปิดหน้าทรัพย์สิน</div>
    <canvas id="qr-canvas" width="200" height="200"></canvas>
    <button class="qr-modal-close" onclick="closeQR()">ปิด</button>
  </div>
</div>

<!-- Topbar -->
<header class="topbar">
  <a class="brand" href="#">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
    </div>
    <div class="brand-text">
      <div class="brand-name">Smart Asset Tracker</div>
      <div class="brand-sub">ศูนย์วิจัยหัวกุญแจ · CPF</div>
    </div>
  </a>

  <nav class="topbar-nav">
    <button class="nav-item active" data-tab="dash" onclick="switchTab('dash',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      ภาพรวม
    </button>
    <button class="nav-item" data-tab="list" onclick="switchTab('list',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
      รายการทรัพย์สิน
    </button>
  </nav>

  <div class="topbar-end">
    <div class="live-pill"><div class="live-dot"></div>LIVE</div>
    <div class="top-clock mono" id="top-clock"></div>
    <button class="icon-btn" id="theme-btn" onclick="toggleTheme()" title="เปลี่ยนธีม">🌙</button>
  </div>
</header>

<!-- Main content -->
<main class="page">
  <!-- Dashboard -->
  <div class="tab-pane active" id="tab-dash">
    <div class="page-hd">
      <div class="page-hd-left">
        <div class="page-hd-eyebrow">Enterprise Asset Management</div>
        <div class="page-hd-title">ภาพรวมทรัพย์สิน</div>
        <div class="page-hd-sub">ข้อมูลมูลค่าและค่าเสื่อมราคาคำนวณ ณ เวลาปัจจุบัน</div>
      </div>
    </div>
    <div id="dash-content"></div>
  </div>

  <!-- List — Phase 2 redesign -->
  <div class="tab-pane" id="tab-list">

    <!-- Sticky search bar -->
    <div class="list-sticky">
      <div class="list-search-wrap">
        <div class="search-field search-field-lg">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="fq" placeholder="ค้นหาเลข Asset หรือชื่อทรัพย์สิน..." oninput="applyFilters()" autocomplete="off">
          <button class="search-clear" id="fq-clear" onclick="clearSearch()" title="ล้าง">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <button class="btn btn-ghost btn-sm filter-toggle-btn" onclick="toggleFilters()" id="filter-toggle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          กรอง
          <span class="filter-count" id="filter-count" style="display:none">1</span>
        </button>
        <div class="export-menu-wrap">
          <button class="btn btn-ghost btn-sm" onclick="toggleExport()" id="export-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export
          </button>

// ── Depreciation ──────────────────────────────────────
var DAY=86400000;
function daysInMonth(d){ return new Date(d.getFullYear(),d.getMonth()+1,0).getDate(); }
function calc(a,now){
  var base=a.acq-a.scrap, cap=new Date(a.cap+'T00:00:00'), totalDays=a.life*365;
  var days=Math.floor((now-cap)/DAY), future=days<0;
  if(days<0)days=0;
  if(base<=0) return {acq:a.acq,accu:a.acq-a.scrap,book:a.scrap,pct:100,monthly:0,annual:0,done:true,future:future,cap:cap,totalDays:totalDays,daysUsed:days};
  var daily=base/totalDays, accu=daily*days, done=false;
  if(accu>=base){accu=base;done=true;}
  return {acq:a.acq,accu:accu,book:a.acq-accu,pct:Math.min(100,days/totalDays*100),monthly:done?0:daily*daysInMonth(now),annual:done?0:daily*365,done:done,future:future,cap:cap,totalDays:totalDays,daysUsed:days,daily:daily};
}

// ── Formatters ────────────────────────────────────────
function fmt(n){ return (+n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmt0(n){ return (+n).toLocaleString('en-US',{maximumFractionDigits:0}); }
function fmtDate(d){ return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function esc(s){ return String(s||'').replace(/[&<>"]/g,function(m){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m];}); }
function clock(d){ return d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }

// ── Dashboard ─────────────────────────────────────────
function renderDash(){
  var now=new Date(), tAcq=0,tBook=0,tDep=0,nActive=0,nDone=0,nFuture=0, grpMap={};

    var c=calc(a,now);
    tAcq+=c.acq; tBook+=c.book; tDep+=c.accu;
    if(c.done)nDone++; else if(c.future)nFuture++; else nActive++;
    var g=a.grp.replace(/^\d+\./,'');
    if(!grpMap[g])grpMap[g]={acq:0,book:0,count:0};
    grpMap[g].acq+=c.acq; grpMap[g].book+=c.book; grpMap[g].count++;
  });
  var grpRows=Object.entries(grpMap).sort(function(a,b){return b[1].acq-a[1].acq;}).map(function(e){
    var g=e[0],v=e[1];

  }).join('');
  document.getElementById('dash-content').innerHTML=
    '<div class="kpi-grid">'

    +'<div class="kpi-card"><div class="kpi-header"><div class="kpi-label">มูลค่าซื้อรวม</div><div class="kpi-icon"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><line x1=\"12\" y1=\"1\" x2=\"12\" y2=\"23\"/><path d=\"M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6\"/></svg></div></div><div class="kpi-value mono">'+fmt(tAcq)+'</div><div class="kpi-foot">บาท</div></div>'
    +'<div class="kpi-card success"><div class="kpi-header"><div class="kpi-label">มูลค่าคงเหลือ (สด)</div><div class="kpi-icon"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><polyline points=\"22 7 13.5 15.5 8.5 10.5 2 17\"/><polyline points=\"16 7 22 7 22 13\"/></svg></div></div><div class="kpi-value success mono">'+fmt(tBook)+'</div><div class="kpi-foot">บาท · คำนวณ ณ ปัจจุบัน</div></div>'
    +'<div class="kpi-card"><div class="kpi-header"><div class="kpi-label">ค่าเสื่อมสะสมรวม</div><div class="kpi-icon"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><polyline points=\"22 17 13.5 8.5 8.5 13.5 2 7\"/><polyline points=\"16 17 22 17 22 11\"/></svg></div></div><div class="kpi-value mono">'+fmt(tDep)+'</div><div class="kpi-foot">บาท</div></div>'
    +'</div>'
    +'<div class="kpi-grid" style=\"grid-template-columns:repeat(3,1fr)\">'

    +'<div class="kpi-card danger"><div class="kpi-header"><div class="kpi-label">หมดอายุทางบัญชี</div></div><div class="kpi-value danger mono">'+nDone+'</div><div class="kpi-foot">รายการ</div></div>'
    +'<div class="kpi-card warning"><div class="kpi-header"><div class="kpi-label">ยังไม่เริ่มตัด</div></div><div class="kpi-value warning mono">'+nFuture+'</div><div class="kpi-foot">รายการ</div></div>'

}

// ── List & filters ────────────────────────────────────
function applyFilters(){
  var q=document.getElementById('fq').value.trim().toLowerCase();
  var grp=document.getElementById('fgrp').value;
  var stat=document.getElementById('fstat').value;
  var now=new Date();
  filtered=ALL.filter(function(a){
    if(q&&!a.asset.includes(q)&&!a.desc.toLowerCase().includes(q))return false;
    if(grp&&a.grp!==grp)return false;
    if(stat){var c=calc(a,now);if(stat==='active'&&(c.done||c.future))return false;if(stat==='done'&&!c.done)return false;if(stat==='future'&&!c.future)return false;}
    return true;
  });
  renderList();
}

      +'<div class="empty-title">ไม่พบรายการที่ตรงกัน</div>'

      +'<button class="btn btn-ghost btn-sm" onclick="clearFilters()">ล้างตัวกรอง</button>'

      var bClass=c.done?'danger':c.future?'':'success';

          +'<div class="card-top"><span class="card-asset-num">'+esc(a.asset)+'</span>'+badge+'</div>'

          +'<div class="card-group-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>'+esc(grp)+'</div>'

            +'<div class="card-info-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="card-info-val">'+esc(a.mis)+'</span></div>'

  }

  // ── Table view ─────────────────────────────────────
  if(tbody){
    tbody.innerHTML=show.map(function(a){
      var c=calc(a,now);

function clearFilters(){document.getElementById('fq').value='';document.getElementById('fgrp').value='';document.getElementById('fstat').value='';applyFilters();}

// ── Panel ─────────────────────────────────────────────
// ── Photos & Timeline state ──────────────────────────
var _photos = [];
var _timeline = [];
var _lbIdx = 0;

async function openPanel(assetId){
  var a=ALL.find(function(x){return x._docId===assetId;});
  if(!a)return;
  currentAsset=a;
  var meta=metaCache[assetId]||{loc:'',note:''};
  try{
    var snap=await db.collection('asset_meta').doc(assetId).get();
    if(snap.exists){meta=snap.data();metaCache[assetId]=meta;}
  }catch(e){}

  // Reset tab to info
  switchPTab('info', document.querySelector('.ptab'));

  // Render info panel immediately
  renderPanel(a,meta);

  document.getElementById('panel').classList.add('open');
  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow='hidden';
  if(liveTimer)clearInterval(liveTimer);
  liveTimer=setInterval(function(){tickPanel(a);},1000);

  // Load photos async
  _photos=meta.photos||[];
  renderPhotos(assetId, _photos);

  // Load timeline async
  loadTimeline(assetId);
}

  // Location & note from meta
  var loc=meta.loc||'';

  document.getElementById('panel-body').innerHTML=
    // HERO
    '<div class="ap-hero">'

    +'<div class="ap-hero-overlay"></div>'

      +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="7" y="7" width="3" height="3" rx=".5" fill="currentColor"/><rect x="18" y="7" width="3" height="3" rx=".5" fill="currentColor"/><rect x="7" y="18" width="3" height="3" rx=".5" fill="currentColor"/><path d="M14 14h.01M14 17h3M17 14v3"/></svg>'
    +'</button>'
    +'<div class="ap-hero-content">'
      +'<div class="ap-hero-chips">'
        +'<span class="ap-chip '+statusClass+'">'+statusLabel+'</span>'
        +'<span class="ap-chip">'+esc(a.grp.replace(/^\d+\./,''))+'</span>'
      +'</div>'
      +'<div class="ap-asset-id">ASSET · '+esc(a.asset)+'</div>'
      +'<div class="ap-asset-name">'+esc(a.desc)+'</div>'
      +'<div class="ap-hero-meta">'
        +(loc?'<div class="ap-hero-meta-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><span>'+esc(loc)+'</span></div>':'')

      +'</div>'
    +'</div>'

async function saveMeta(assetId){

function exportExcel(){
  if(!filtered.length){showToast('ไม่มีข้อมูลที่จะ export');return;}
  var rows=getExportData();
  var ws=XLSX.utils.json_to_sheet(rows);
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Assets');
  XLSX.writeFile(wb,'smart-asset-tracker-'+new Date().toISOString().slice(0,10)+'.xlsx');
  showToast('✓ Export Excel สำเร็จ ('+filtered.length+' รายการ)');
}
function exportCSV(){
  if(!filtered.length){showToast('ไม่มีข้อมูลที่จะ export');return;}
  var rows=getExportData();
  var keys=Object.keys(rows[0]);
  var csv='\uFEFF'+keys.join(',')+'\n'+rows.map(function(r){return keys.map(function(k){var v=String(r[k]||'');return v.includes(',')||v.includes('"')?'"'+v.replace(/"/g,'""')+'"':v;}).join(',');}).join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='smart-asset-tracker-'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  showToast('✓ Export CSV สำเร็จ ('+filtered.length+' รายการ)');
}

async function handlePhotoUpload(e, docId){
  var files=Array.from(e.target.files);
  if(!files.length) return;
  showToast('กำลังบีบอัดรูปภาพ...');
  var newPhotos=[];
  for(var i=0;i<files.length;i++){
    try{ newPhotos.push(await compressImage(files[i],800,0.75)); }
    catch(err){ console.error(err); }
  }
  var meta=metaCache[docId]||{loc:'',note:''};
  _photos=(meta.photos||[]).concat(newPhotos);
  meta.photos=_photos;
  try{
    await db.collection('asset_meta').doc(docId).set(meta);
    metaCache[docId]=meta;
    renderPhotos(docId,_photos);
    // Update cover in hero
    if(_photos.length===1){
      var heroImgEl=document.querySelector('.ap-cover-img');
      var placeholderEl=document.querySelector('.ap-cover-placeholder');
      if(!heroImgEl&&placeholderEl){
        var img=document.createElement('img');
        img.className='ap-cover-img'; img.src=_photos[0]; img.alt='cover';
        placeholderEl.parentNode.replaceChild(img,placeholderEl);
      } else if(heroImgEl){ heroImgEl.src=_photos[0]; }
    }
    showToast('✓ บันทึกรูปภาพแล้ว '+newPhotos.length+' รูป');
  }catch(err){ showToast('❌ บันทึกไม่สำเร็จ: '+err.message); }
}

function compressImage(file,maxDim,quality){
  return new Promise(function(resolve,reject){
    var reader=new FileReader();
    reader.onload=function(ev){
      var img=new Image();
      img.onload=function(){
        var w=img.width,h=img.height;
        if(w>maxDim||h>maxDim){
          if(w>h){h=Math.round(h*maxDim/w);w=maxDim;}
          else{w=Math.round(w*maxDim/h);h=maxDim;}
        }
        var canvas=document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.onerror=reject;
      img.src=ev.target.result;
    };
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

  note:      {label:'บันทึก',    color:'#D97706', icon:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>'}
};

async function loadTimeline(docId){
  var el=document.getElementById('panel-timeline');
  if(!el) return;
  try{
    var snap=await db.collection('asset_timeline').doc(docId).get();
    _timeline=snap.exists?(snap.data().events||[]):[];
    renderTimeline(docId,_timeline);
  }catch(e){
    _timeline=[]; renderTimeline(docId,[]);
  }
}

function renderTimeline(docId, events){
  var el=document.getElementById('panel-timeline');
  if(!el) return;
  // Sort newest first
  var sorted=events.slice().sort(function(a,b){return b.ts-a.ts;});
  el.innerHTML='<div class="timeline">'
    // Add event form
    +'<div class="tl-entry-row">'
      +'<select class="tl-type-sel" id="tl-type">'
      +Object.keys(TL_TYPES).map(function(k){return '<option value="'+k+'">'+TL_TYPES[k].label+'</option>';}).join('')
      +'</select>'
    +'</div>'
    +'<div class="tl-entry-row">'
      +'<input class="tl-desc-input" id="tl-desc" placeholder="รายละเอียด เช่น ย้ายไปโรงเรือน B...">'
    +'</div>'
    +'<button class="btn btn-primary tl-add-btn" onclick="addTimelineEvent('"+esc(docId)+"')">'
      +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>'
      +'เพิ่มบันทึก'
    +'</button>'

    // Timeline list
    +'<div class="tl-list">'
    +(sorted.length ? sorted.map(function(ev){
        var t=TL_TYPES[ev.type]||TL_TYPES.note;
        var d=new Date(ev.ts);
        var timeStr=fmtDate(d)+' '+d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
        return '<div class="tl-item tl-'+ev.type+'">'
          +'<div class="tl-icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">'+t.icon+'</svg></div>'
          +'<div class="tl-body">'
            +'<div class="tl-header">'
              +'<span class="tl-type-label">'+t.label+'</span>'
              +'<span class="tl-time">'+timeStr+'</span>'
            +'</div>'
            +'<div class="tl-desc">'+esc(ev.desc||'-')+'</div>'
            +(ev.user?'<div class="tl-user"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>'+esc(ev.user)+'</div>':'')
          +'</div>'
        +'</div>';
      }).join('')
      :'<div class="tl-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>ยังไม่มีประวัติ<br>เพิ่มบันทึกแรกด้านบน</div>'
    )
    +'</div>'
    +'</div>';
}

async function addTimelineEvent(docId){
  var typeEl=document.getElementById('tl-type');
  var descEl=document.getElementById('tl-desc');
  if(!typeEl||!descEl) return;
  var desc=descEl.value.trim();
  if(!desc){showToast('กรุณาใส่รายละเอียด');return;}
  var ev={type:typeEl.value, desc:desc, ts:Date.now(), user:'ผู้ใช้ระบบ'};
  _timeline.push(ev);
  try{
    await db.collection('asset_timeline').doc(docId).set({events:_timeline});
    descEl.value='';
    renderTimeline(docId,_timeline);
    showToast('✓ บันทึก Timeline แล้ว');
    // Also add to asset_meta updatedAt
    var meta=metaCache[docId]||{};
    meta.updatedAt=new Date().toISOString();
    await db.collection('asset_meta').doc(docId).set(meta,{merge:true});
  }catch(e){ showToast('❌ บันทึกไม่สำเร็จ: '+e.message); }
}


// ── Phase 2 UI utilities ──────────────────────────────
var _currentView = 'card';
var _filtersOpen = false;
var _exportOpen = false;

function setView(v){
  _currentView=v;
  document.getElementById('card-grid').style.display = v==='card'?'':'none';
  document.getElementById('table-view').style.display = v==='table'?'':'none';
  document.getElementById('view-card').classList.toggle('active', v==='card');
  document.getElementById('view-table').classList.toggle('active', v==='table');
}

function toggleFilters(){
  _filtersOpen=!_filtersOpen;
  document.getElementById('filter-panel').classList.toggle('open', _filtersOpen);
  document.getElementById('filter-toggle').classList.toggle('active', _filtersOpen);
  updateFilterCount();
}

function updateFilterCount(){
  var n=0;
  if(document.getElementById('fgrp').value) n++;
  if(document.getElementById('fstat').value) n++;
  var el=document.getElementById('filter-count');
  if(el){ el.style.display=n>0?'flex':'none'; el.textContent=n; }
}

function toggleExport(){
  _exportOpen=!_exportOpen;
  document.getElementById('export-dropdown').classList.toggle('open',_exportOpen);
}

function clearSearch(){
  document.getElementById('fq').value='';
  document.getElementById('fq-clear').classList.remove('show');
  applyFilters();
}

// Show/hide clear button on search input
document.addEventListener('DOMContentLoaded',function(){
  var fq=document.getElementById('fq');
  if(fq){
    fq.addEventListener('input',function(){
      var cl=document.getElementById('fq-clear');
      if(cl) cl.classList.toggle('show', fq.value.length>0);
    });
  }
  // Close export on outside click
  document.addEventListener('click',function(e){
    if(_exportOpen && !e.target.closest('.export-menu-wrap')){
      _exportOpen=false;
      var d=document.getElementById('export-dropdown');
      if(d) d.classList.remove('open');
    }
  });
});

// Skeleton loading
function showSkeleton(){
  var grid=document.getElementById('card-grid');
  if(!grid) return;
  var sk='';
  for(var i=0;i<9;i++){
    sk+='<div class="skeleton-card">'
      +'<div class="skel skel-strip"></div>'
      +'<div class="skel-body">'
        +'<div class="skel w-30 skel-line" style="margin-bottom:16px"></div>'
        +'<div class="skel w-90 skel-line lg"></div>'
        +'<div class="skel w-70 skel-line"></div>'
        +'<div class="skel w-50 skel-line"></div>'
        +'<div class="skel w-60 skel-line"></div>'
      +'</div>'
      +'<div class="skel-footer"></div>'
      +'</div>';
  }
  grid.className='skeleton-grid';
  grid.innerHTML=sk;
}


// ── Init ──────────────────────────────────────────────
async function init(){
  try{
    showSkeleton();
    var snap=await db.collection('assets').get();
    ALL=[];
    snap.forEach(function(d){var rec=d.data();rec._docId=d.id;ALL.push(rec);});
    ALL.sort(function(a,b){return +a.asset-+b.asset;});
    var grps=[...new Set(ALL.map(function(a){return a.grp;}))].sort();
    var sel=document.getElementById('fgrp');
    grps.forEach(function(g){var o=document.createElement('option');o.value=g;o.textContent=g.replace(/^\d+\./,'');sel.appendChild(o);});
    filtered=[...ALL];
    renderDash();
    renderList();
    document.getElementById('loading').style.display='none';
    document.getElementById('card-grid').className='asset-grid';
  }catch(e){
    document.getElementById('loading').innerHTML='<div style="text-align:center"><div style="font-size:40px;margin-bottom:12px">⚠️</div><div style="color:var(--danger-500);font-size:15px;font-weight:600">เชื่อมต่อ Firestore ไม่ได้<br><small style=\'color:var(--ink-3);font-weight:400\'>'+e.message+'</small></div></div>';
  }
}
init();
</script>
