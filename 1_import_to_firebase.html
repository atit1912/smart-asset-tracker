";
      }
      btn.textContent = "✓ Import สำเร็จ!";
      btn.style.background = "#2A7F62";
      log.textContent += "
🎉 เสร็จสมบูรณ์ " + total + " รายการ
ปิดหน้านี้และเปิด asset_finder.html ได้เลย";
    } catch(e) {
      log.textContent += "
❌ Error: " + e.message;
      btn.disabled = false;
      btn.textContent = "ลองใหม่";
      running = false;
    }
  }

  window.runImport = runImport;
<\/script>
