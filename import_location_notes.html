var running=false;
async function runImport(){
  if(running)return;running=true;
  var btn=document.getElementById('btn'),prog=document.getElementById('prog'),log=document.getElementById('log');
  btn.disabled=true;btn.textContent='กำลัง import...';log.textContent='';
  var total=UPDATES.length,done=0,skip=0,errs=0;

  for(var i=0;i<total;i++){
    var u=UPDATES[i];
    try{
      // Try exact asset ID first as docId
      var docIds=[u.asset];
      // Also handle 1065195 which has two docIds
      if(u.asset==='1065195') docIds=['1065195_20120731','1065195_20130731'];

      for(var j=0;j<docIds.length;j++){
        var docId=docIds[j];
        var snap=await db.collection('asset_meta').doc(docId).get();
        var existing=snap.exists?snap.data():{};
        // Merge: keep photos and other fields, only set loc/note if not empty
        var update=Object.assign({},existing);
        if(u.loc) update.loc=u.loc;
        if(u.note) update.note=u.note;
        update.updatedAt=new Date().toISOString();
        await db.collection('asset_meta').doc(docId).set(update);
      }
      done++;
    }catch(e){
      errs++;
      log.textContent+='Error '+u.asset+': '+e.message+'\n';
    }
    var pct=Math.round((i+1)/total*100);
    prog.style.width=pct+'%';prog.textContent=pct+'%';
    if(done%50===0||i===total-1){
      log.textContent='OK: '+done+' / '+total+'\n';
    }
  }
  btn.textContent=errs?'เสร็จ (มี error '+errs+')':'✓ Import สำเร็จ!';
  btn.style.background=errs?'#EF4444':'#10B981';
  log.textContent='สำเร็จ: '+done+' รายการ | Error: '+errs+'\nปิดหน้านี้ได้เลย';
}
